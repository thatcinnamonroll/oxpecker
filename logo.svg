         rdf:about=""><dc:title>oxbercia</dc:title><dc:creator><cc:Agent><dc:title>qbesi (qbesidev@gmail.com)</dc:title></cc:Agent></dc:creator><dc:source>Based on a &quot;Yellow-billed oxpeckers (Buphagus africanus africanus) on zebra&quot; photograph by Charles J. Sharp, accessed on https://en.wikipedia.org/wiki/File:Yellow-billed_oxpeckers_(Buphagus_africanus_africanus)_on_zebra.jpg, licensed under CC BY-SA 4.0 (https://creativecommons.org/licenses/by-sa/4.0).</dc:source><dc:rights><cc:Agent><dc:title>CC BY-SA 4.0 (https://creativecommons.org/licenses/by-sa/4.0)</dc:title></cc:Agent></dc:rights><dc:date>07.05.2026</dc:date><dc:description>A simple, minimalistic, bold outline of an upper part of an oxpeckers head, with its beak outline, the line sepearting the upper and lower beak and an eye. The logo is white on a gradient background. The gradient is purple on the upper left corner and shifts into dark blue in the lower right corner.</dc:description><dc:contributor><cc:Agent><dc:title>thatcinnamonroll</dc:title></cc:Agent></dc:contributor><cc:license
